services:
  n8n-youtube:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - /mnt/n8n/:/home/node/.n8n
    environment:
      GENERIC_TIMEZONE: America/Sao_Paulo
    restart: unless-stopped
    networks:
      - n8n-network-youtube
 
networks:
  n8n-network-youtube:
    driver: bridge
